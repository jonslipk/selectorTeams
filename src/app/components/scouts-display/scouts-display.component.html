<div class="display-container">
  <h2>Scouts</h2>
  <div class="table-wrapper">
    <table class="scouts-table">
      <thead>
        <tr>
          <th>Jogador</th>
          <th>Pontos</th>
          <th>Vitórias</th>
          <th>Gols</th>
          <th>Assistências</th>
          <th>J. Ruins</th>
          <th>G. Contra</th>
        </tr>
      </thead>
      <tbody>
        <ng-container *ngFor="let s of sortedScouts">
          <tr>
            <td data-label="Jogador">{{ s.player }}</td>
            <td data-label="Pontos">{{ s.pontos }}</td>
            <td data-label="Vitórias">{{ s.vitorias || 0 }}</td>
            <td data-label="Gols">{{ s.gols }}</td>
            <td data-label="Assistências">{{ s.assistencias }}</td>
            <td data-label="J. Ruins">{{ s.jogadasRuins || 0 }}</td>
            <td data-label="G. Contra">{{ s.golsContra || 0 }}</td>
          </tr>
        </ng-container>
      </tbody>
    </table>
  </div>
</div>
